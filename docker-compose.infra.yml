services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: planiq
      MINIO_ROOT_PASSWORD: planiq-secret
    ports: ["9100:9000", "9101:9001"]
    volumes: ["minio_data:/data"]

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "until (mc alias set m http://minio:9000 planiq planiq-secret) do sleep 2; done;
      mc mb -p m/planiq 2>/dev/null || true;
      mc anonymous set download m/planiq;
      exit 0;"

volumes:
  redis_data:
  minio_data:
